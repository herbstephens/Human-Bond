<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B02A37;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bondGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F23;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A1D3A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#FDFDFB"/>
  <!-- Two interlocking circles forming the bond -->
  <circle cx="155" cy="200" r="85" fill="none" stroke="url(#bondGrad2)" stroke-width="22"/>
  <circle cx="245" cy="200" r="85" fill="none" stroke="url(#bondGrad)" stroke-width="22"/>
  <!-- Center dot - the shared treasury / point of union -->
  <circle cx="200" cy="200" r="10" fill="#F1B24A"/>
</svg>
